name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # The committed public/runner.wasm.gz is a generated artifact; make sure the
      # runner source still compiles for the browser target so it can be rebuilt.
      - name: Build the WASM runner
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/wasm

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # Report-only: govulncheck surfaces vulnerabilities — notably real ones in
      # our dependencies — as a warning annotation but does not block merges.
      # Standard-library findings track the Go release cadence (their only fix is a
      # newer Go), so they must not gate every PR; we build and release on current
      # stable Go to stay clear of them. govulncheck is pinned for reproducible CI.
      - name: govulncheck (report-only)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./... || echo "::warning::govulncheck reported findings — see job logs (report-only, not blocking)"

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # Catch GoReleaser config errors and deprecations on every PR, long before
      # a release tag is pushed.
      - name: Validate release config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
